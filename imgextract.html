<!DOCTYPE html>
<html>
<head><title>Image Extractor</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px">
  <h3>Drop or select image to extract base64</h3>
  <input type="file" id="fileInput" accept="image/*" style="margin:10px 0;display:block">
  <canvas id="canvas" style="max-width:300px;border:1px solid #444;display:block;margin:10px 0"></canvas>
  <textarea id="output" rows="4" style="width:100%;font-size:10px;background:#222;color:#0f0;border:none" placeholder="Base64 will appear here..."></textarea>
  <script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        const img = new Image();
        img.onload = function() {
          const c = document.getElementById('canvas');
          c.width = img.width; c.height = img.height;
          c.getContext('2d').drawImage(img, 0, 0);
          document.getElementById('output').value = c.toDataURL('image/png');
          document.title = 'READY:' + img.width + 'x' + img.height;
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
